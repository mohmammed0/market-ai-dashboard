services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${MARKET_AI_POSTGRES_DB:-market_ai}
      POSTGRES_USER: ${MARKET_AI_POSTGRES_USER:-market_ai}
      POSTGRES_PASSWORD: ${MARKET_AI_POSTGRES_PASSWORD:-market_ai_dev_password}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${MARKET_AI_POSTGRES_USER:-market_ai} -d ${MARKET_AI_POSTGRES_DB:-market_ai}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    volumes:
      - postgres_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: ${MARKET_AI_DB_MEMORY_LIMIT:-1536M}
          cpus: "${MARKET_AI_DB_CPU_LIMIT:-1.5}"
    shm_size: '128mb'
    command: >
      postgres
      -c shared_buffers=128MB
      -c effective_cache_size=256MB
      -c work_mem=8MB
      -c maintenance_work_mem=64MB
      -c max_connections=50
      -c checkpoint_completion_target=0.9
      -c random_page_cost=1.1

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: ["sh", "-c", "python -m uvicorn backend.app.main:app --host 0.0.0.0 --port 8000 --workers ${MARKET_AI_BACKEND_WORKERS:-2}"]
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      MARKET_AI_ENV: ${MARKET_AI_ENV:-production}
      MARKET_AI_SERVER_ROLE: ${MARKET_AI_SERVER_ROLE_API:-api}
      MARKET_AI_HOST: 0.0.0.0
      MARKET_AI_PORT: 8000
      MARKET_AI_DATA_DIR: ${MARKET_AI_DATA_DIR:-/app/data}
      MARKET_AI_DATABASE_URL: ${MARKET_AI_DATABASE_URL:-postgresql+psycopg://market_ai:market_ai_dev_password@db:5432/market_ai}
      MARKET_AI_PUBLIC_WEB_ORIGIN: ${MARKET_AI_PUBLIC_WEB_ORIGIN:-}
      MARKET_AI_PUBLIC_API_ORIGIN: ${MARKET_AI_PUBLIC_API_ORIGIN:-}
      MARKET_AI_SERVER_NAME: ${MARKET_AI_SERVER_NAME:-}
      MARKET_AI_TRUSTED_HOSTS: ${MARKET_AI_TRUSTED_HOSTS:-}
      MARKET_AI_PROXY_HEADERS_ENABLED: ${MARKET_AI_PROXY_HEADERS_ENABLED:-1}
      MARKET_AI_FORWARDED_ALLOW_IPS: ${MARKET_AI_FORWARDED_ALLOW_IPS:-*}
      MARKET_AI_ALLOWED_ORIGINS: ${MARKET_AI_ALLOWED_ORIGINS:-}
      MARKET_AI_ENABLE_SCHEDULER: ${MARKET_AI_ENABLE_SCHEDULER:-1}
      MARKET_AI_SCHEDULER_RUNNER_ROLE: ${MARKET_AI_SCHEDULER_RUNNER_ROLE:-automation}
      MARKET_AI_ENABLE_CONTINUOUS_LEARNING: ${MARKET_AI_ENABLE_CONTINUOUS_LEARNING:-0}
      MARKET_AI_CONTINUOUS_LEARNING_RUNNER_ROLE: ${MARKET_AI_CONTINUOUS_LEARNING_RUNNER_ROLE:-automation}
      MARKET_AI_CONTINUOUS_LEARNING_CYCLE_SECONDS: ${MARKET_AI_CONTINUOUS_LEARNING_CYCLE_SECONDS:-1800}
      MARKET_AI_ENABLE_AUTO_RETRAIN: ${MARKET_AI_ENABLE_AUTO_RETRAIN:-0}
      MARKET_AI_AUTONOMOUS_INCLUDE_DL: ${MARKET_AI_AUTONOMOUS_INCLUDE_DL:-0}
      MARKET_AI_AUTONOMOUS_HISTORY_LOOKBACK_DAYS: ${MARKET_AI_AUTONOMOUS_HISTORY_LOOKBACK_DAYS:-60}
      MARKET_AI_DB_AUTO_MIGRATE: ${MARKET_AI_DB_AUTO_MIGRATE:-1}
      MARKET_AI_DB_RUN_MIGRATIONS_ON_STARTUP: ${MARKET_AI_DB_RUN_MIGRATIONS_ON_STARTUP_API:-1}
      MARKET_AI_DB_LEGACY_BOOTSTRAP: ${MARKET_AI_DB_LEGACY_BOOTSTRAP:-0}
      MARKET_AI_DB_POOL_SIZE: ${MARKET_AI_DB_POOL_SIZE:-8}
      MARKET_AI_DB_MAX_OVERFLOW: ${MARKET_AI_DB_MAX_OVERFLOW:-16}
      MARKET_AI_DB_POOL_RECYCLE_SECONDS: ${MARKET_AI_DB_POOL_RECYCLE_SECONDS:-1800}
      MARKET_AI_DB_CONNECT_TIMEOUT_SECONDS: ${MARKET_AI_DB_CONNECT_TIMEOUT_SECONDS:-10}
      MARKET_AI_ANALYSIS_CONCURRENCY: ${MARKET_AI_ANALYSIS_CONCURRENCY:-3}
      MARKET_AI_LOG_LEVEL: ${MARKET_AI_LOG_LEVEL:-INFO}
      MARKET_AI_LIGHTWEIGHT_EXPERIMENT_MODE: ${MARKET_AI_LIGHTWEIGHT_EXPERIMENT_MODE:-0}
      MARKET_AI_LIGHTWEIGHT_EXPERIMENT_INCLUDE_DL: ${MARKET_AI_LIGHTWEIGHT_EXPERIMENT_INCLUDE_DL:-0}
      MARKET_AI_LIGHTWEIGHT_EXPERIMENT_MAX_SYMBOLS: ${MARKET_AI_LIGHTWEIGHT_EXPERIMENT_MAX_SYMBOLS:-8}
      MARKET_AI_LIGHTWEIGHT_EXPERIMENT_NEWS_LIMIT: ${MARKET_AI_LIGHTWEIGHT_EXPERIMENT_NEWS_LIMIT:-8}
      MARKET_AI_SIGNAL_REFRESH_MINUTES: ${MARKET_AI_SIGNAL_REFRESH_MINUTES:-5}
      MARKET_AI_SIGNAL_CACHE_TTL_SECONDS: ${MARKET_AI_SIGNAL_CACHE_TTL_SECONDS:-300}
      MARKET_AI_SIGNAL_REFRESH_MAX_WORKERS: ${MARKET_AI_SIGNAL_REFRESH_MAX_WORKERS:-3}
      MARKET_AI_TRAINING_SUBPROCESS_ENABLED: ${MARKET_AI_TRAINING_SUBPROCESS_ENABLED:-1}
      MARKET_AI_REMOTE_TRAINING_ENABLED: ${MARKET_AI_REMOTE_TRAINING_ENABLED:-0}
      MARKET_AI_WORKER_TOKEN: ${MARKET_AI_WORKER_TOKEN:-}
      MARKET_AI_REMOTE_WORKER_STALE_SECONDS: ${MARKET_AI_REMOTE_WORKER_STALE_SECONDS:-300}
      MARKET_AI_SAMPLE_SYMBOLS: ${MARKET_AI_SAMPLE_SYMBOLS:-AAPL,MSFT,NVDA,AMZN,GOOGL,META,SPY,QQQ}
      MARKET_AI_BROKER_PROVIDER: ${MARKET_AI_BROKER_PROVIDER:-alpaca}
      MARKET_AI_ALPACA_ENABLED: ${MARKET_AI_ALPACA_ENABLED:-1}
      ALPACA_API_KEY: ${ALPACA_API_KEY:-}
      ALPACA_SECRET_KEY: ${ALPACA_SECRET_KEY:-}
      ALPACA_PAPER: ${ALPACA_PAPER:-1}
      MARKET_AI_PRIMARY_MARKET_DATA_PROVIDER: ${MARKET_AI_PRIMARY_MARKET_DATA_PROVIDER:-alpaca}
      MARKET_AI_FALLBACK_MARKET_DATA_PROVIDERS: ${MARKET_AI_FALLBACK_MARKET_DATA_PROVIDERS:-polygon,tiingo,twelvedata,yahoo}
      MARKET_AI_MARKET_TIMEZONE: ${MARKET_AI_MARKET_TIMEZONE:-America/New_York}
      MARKET_AI_MARKET_SESSION_CLOSE_HOUR: ${MARKET_AI_MARKET_SESSION_CLOSE_HOUR:-16}
      MARKET_AI_MARKET_SESSION_CLOSE_MINUTE: ${MARKET_AI_MARKET_SESSION_CLOSE_MINUTE:-0}
      MARKET_AI_MARKET_SESSION_CLOSE_BUFFER_MINUTES: ${MARKET_AI_MARKET_SESSION_CLOSE_BUFFER_MINUTES:-20}
      ALPACA_MARKET_DATA_API_KEY: ${ALPACA_MARKET_DATA_API_KEY:-}
      ALPACA_MARKET_DATA_SECRET_KEY: ${ALPACA_MARKET_DATA_SECRET_KEY:-}
      MARKET_AI_ALPACA_MARKET_DATA_BASE_URL: ${MARKET_AI_ALPACA_MARKET_DATA_BASE_URL:-https://data.alpaca.markets}
      MARKET_AI_ALPACA_MARKET_DATA_FEED: ${MARKET_AI_ALPACA_MARKET_DATA_FEED:-iex}
      POLYGON_API_KEY: ${POLYGON_API_KEY:-}
      MARKET_AI_POLYGON_MARKET_DATA_BASE_URL: ${MARKET_AI_POLYGON_MARKET_DATA_BASE_URL:-https://api.polygon.io}
      TIINGO_API_KEY: ${TIINGO_API_KEY:-}
      MARKET_AI_TIINGO_MARKET_DATA_BASE_URL: ${MARKET_AI_TIINGO_MARKET_DATA_BASE_URL:-https://api.tiingo.com}
      TWELVEDATA_API_KEY: ${TWELVEDATA_API_KEY:-}
      MARKET_AI_TWELVEDATA_MARKET_DATA_BASE_URL: ${MARKET_AI_TWELVEDATA_MARKET_DATA_BASE_URL:-https://api.twelvedata.com}
      MARKET_AI_BROKER_ORDER_SUBMISSION_ENABLED: ${MARKET_AI_BROKER_ORDER_SUBMISSION_ENABLED:-0}
      MARKET_AI_BROKER_LIVE_EXECUTION_ENABLED: ${MARKET_AI_BROKER_LIVE_EXECUTION_ENABLED:-0}
      MARKET_AI_AUTO_TRADING_ENABLED: ${MARKET_AI_AUTO_TRADING_ENABLED:-0}
      MARKET_AI_AUTO_TRADING_CYCLE_MINUTES: ${MARKET_AI_AUTO_TRADING_CYCLE_MINUTES:-5}
      MARKET_AI_AUTO_TRADING_QUANTITY: ${MARKET_AI_AUTO_TRADING_QUANTITY:-1}
      MARKET_AI_PAPER_TRADING_24_7: ${MARKET_AI_PAPER_TRADING_24_7:-1}
      MARKET_AI_PAPER_STARTING_CASH: ${MARKET_AI_PAPER_STARTING_CASH:-100000}
      MARKET_AI_CONTINUOUS_PAPER_TRADING: ${MARKET_AI_CONTINUOUS_PAPER_TRADING:-1}
      MARKET_AI_AUTO_TRADING_SYMBOL_LIMIT: ${MARKET_AI_AUTO_TRADING_SYMBOL_LIMIT:-8}
      MARKET_AI_AUTO_TRADING_ANALYSIS_LOOKBACK_DAYS: ${MARKET_AI_AUTO_TRADING_ANALYSIS_LOOKBACK_DAYS:-30}
      MARKET_AI_AUTO_TRADING_NOTIONAL_PER_TRADE: ${MARKET_AI_AUTO_TRADING_NOTIONAL_PER_TRADE:-0}
      MARKET_AI_RISK_MAX_TRADE_PCT: ${MARKET_AI_RISK_MAX_TRADE_PCT:-10.0}
      MARKET_AI_AUTH_DEFAULT_USERNAME: ${MARKET_AI_AUTH_DEFAULT_USERNAME:-admin}
      MARKET_AI_AUTH_DEFAULT_PASSWORD: ${MARKET_AI_AUTH_DEFAULT_PASSWORD:-}
      MARKET_AI_AUTH_ENABLED: ${MARKET_AI_AUTH_ENABLED:-1}
      MARKET_AI_AUTH_SECRET_KEY: ${MARKET_AI_AUTH_SECRET_KEY:-}
      OLLAMA_ENABLED: ${OLLAMA_ENABLED:-1}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gemma2:2b}
      MARKET_AI_PROVIDER: ${MARKET_AI_PROVIDER:-ollama}
      OLLAMA_TIMEOUT_SECONDS: ${OLLAMA_TIMEOUT_SECONDS:-300}
      MARKET_AI_REDIS_URL: redis://redis:6379/0
      MARKET_AI_REDIS_ENABLED: "1"
      MARKET_AI_REDIS_CACHE_TTL_DEFAULT: "300"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "127.0.0.1:${MARKET_AI_BACKEND_PUBLISHED_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - ./data:/app/data
      - ./model_artifacts:/app/model_artifacts
    deploy:
      resources:
        limits:
          memory: ${MARKET_AI_BACKEND_MEMORY_LIMIT:-4G}
          cpus: "${MARKET_AI_BACKEND_CPU_LIMIT:-3.0}"

  automation:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: ["python", "-m", "backend.app.workers.automation_runner"]
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      backend:
        condition: service_healthy
    environment:
      MARKET_AI_ENV: ${MARKET_AI_ENV:-production}
      MARKET_AI_SERVER_ROLE: ${MARKET_AI_SERVER_ROLE_AUTOMATION:-automation}
      MARKET_AI_HOST: 0.0.0.0
      MARKET_AI_PORT: 8000
      MARKET_AI_DATA_DIR: ${MARKET_AI_DATA_DIR:-/app/data}
      MARKET_AI_DATABASE_URL: ${MARKET_AI_DATABASE_URL:-postgresql+psycopg://market_ai:market_ai_dev_password@db:5432/market_ai}
      MARKET_AI_PUBLIC_WEB_ORIGIN: ${MARKET_AI_PUBLIC_WEB_ORIGIN:-}
      MARKET_AI_PUBLIC_API_ORIGIN: ${MARKET_AI_PUBLIC_API_ORIGIN:-}
      MARKET_AI_SERVER_NAME: ${MARKET_AI_SERVER_NAME:-}
      MARKET_AI_TRUSTED_HOSTS: ${MARKET_AI_TRUSTED_HOSTS:-}
      MARKET_AI_PROXY_HEADERS_ENABLED: ${MARKET_AI_PROXY_HEADERS_ENABLED:-1}
      MARKET_AI_FORWARDED_ALLOW_IPS: ${MARKET_AI_FORWARDED_ALLOW_IPS:-*}
      MARKET_AI_ALLOWED_ORIGINS: ${MARKET_AI_ALLOWED_ORIGINS:-}
      MARKET_AI_ENABLE_SCHEDULER: ${MARKET_AI_ENABLE_SCHEDULER:-1}
      MARKET_AI_SCHEDULER_RUNNER_ROLE: ${MARKET_AI_SCHEDULER_RUNNER_ROLE:-automation}
      MARKET_AI_ENABLE_CONTINUOUS_LEARNING: ${MARKET_AI_ENABLE_CONTINUOUS_LEARNING:-0}
      MARKET_AI_CONTINUOUS_LEARNING_RUNNER_ROLE: ${MARKET_AI_CONTINUOUS_LEARNING_RUNNER_ROLE:-automation}
      MARKET_AI_CONTINUOUS_LEARNING_CYCLE_SECONDS: ${MARKET_AI_CONTINUOUS_LEARNING_CYCLE_SECONDS:-1800}
      MARKET_AI_ENABLE_AUTO_RETRAIN: ${MARKET_AI_ENABLE_AUTO_RETRAIN:-0}
      MARKET_AI_ENABLE_AUTONOMOUS_CYCLE: ${MARKET_AI_ENABLE_AUTONOMOUS_CYCLE:-0}
      MARKET_AI_AUTONOMOUS_CYCLE_HOURS: ${MARKET_AI_AUTONOMOUS_CYCLE_HOURS:-12}
      MARKET_AI_AUTONOMOUS_INCLUDE_DL: ${MARKET_AI_AUTONOMOUS_INCLUDE_DL:-0}
      MARKET_AI_AUTONOMOUS_HISTORY_LOOKBACK_DAYS: ${MARKET_AI_AUTONOMOUS_HISTORY_LOOKBACK_DAYS:-60}
      MARKET_AI_AUTONOMOUS_ANALYSIS_SYMBOL_LIMIT: ${MARKET_AI_AUTONOMOUS_ANALYSIS_SYMBOL_LIMIT:-10}
      MARKET_AI_AUTONOMOUS_TRAIN_SYMBOL_LIMIT: ${MARKET_AI_AUTONOMOUS_TRAIN_SYMBOL_LIMIT:-12}
      MARKET_AI_DB_AUTO_MIGRATE: ${MARKET_AI_DB_AUTO_MIGRATE:-1}
      MARKET_AI_DB_RUN_MIGRATIONS_ON_STARTUP: ${MARKET_AI_DB_RUN_MIGRATIONS_ON_STARTUP_AUTOMATION:-0}
      MARKET_AI_DB_LEGACY_BOOTSTRAP: ${MARKET_AI_DB_LEGACY_BOOTSTRAP:-0}
      MARKET_AI_DB_POOL_SIZE: ${MARKET_AI_DB_POOL_SIZE:-8}
      MARKET_AI_DB_MAX_OVERFLOW: ${MARKET_AI_DB_MAX_OVERFLOW:-16}
      MARKET_AI_DB_POOL_RECYCLE_SECONDS: ${MARKET_AI_DB_POOL_RECYCLE_SECONDS:-1800}
      MARKET_AI_DB_CONNECT_TIMEOUT_SECONDS: ${MARKET_AI_DB_CONNECT_TIMEOUT_SECONDS:-10}
      MARKET_AI_ANALYSIS_CONCURRENCY: ${MARKET_AI_ANALYSIS_CONCURRENCY:-3}
      MARKET_AI_LOG_LEVEL: ${MARKET_AI_LOG_LEVEL:-INFO}
      MARKET_AI_LIGHTWEIGHT_EXPERIMENT_MODE: ${MARKET_AI_LIGHTWEIGHT_EXPERIMENT_MODE:-0}
      MARKET_AI_LIGHTWEIGHT_EXPERIMENT_INCLUDE_DL: ${MARKET_AI_LIGHTWEIGHT_EXPERIMENT_INCLUDE_DL:-0}
      MARKET_AI_LIGHTWEIGHT_EXPERIMENT_MAX_SYMBOLS: ${MARKET_AI_LIGHTWEIGHT_EXPERIMENT_MAX_SYMBOLS:-8}
      MARKET_AI_LIGHTWEIGHT_EXPERIMENT_NEWS_LIMIT: ${MARKET_AI_LIGHTWEIGHT_EXPERIMENT_NEWS_LIMIT:-8}
      MARKET_AI_SIGNAL_REFRESH_MINUTES: ${MARKET_AI_SIGNAL_REFRESH_MINUTES:-5}
      MARKET_AI_SIGNAL_CACHE_TTL_SECONDS: ${MARKET_AI_SIGNAL_CACHE_TTL_SECONDS:-300}
      MARKET_AI_SIGNAL_REFRESH_MAX_WORKERS: ${MARKET_AI_SIGNAL_REFRESH_MAX_WORKERS:-3}
      MARKET_AI_BROKER_PROVIDER: ${MARKET_AI_BROKER_PROVIDER:-alpaca}
      MARKET_AI_ALPACA_ENABLED: ${MARKET_AI_ALPACA_ENABLED:-1}
      ALPACA_API_KEY: ${ALPACA_API_KEY:-}
      ALPACA_SECRET_KEY: ${ALPACA_SECRET_KEY:-}
      ALPACA_PAPER: ${ALPACA_PAPER:-1}
      MARKET_AI_PRIMARY_MARKET_DATA_PROVIDER: ${MARKET_AI_PRIMARY_MARKET_DATA_PROVIDER:-alpaca}
      MARKET_AI_FALLBACK_MARKET_DATA_PROVIDERS: ${MARKET_AI_FALLBACK_MARKET_DATA_PROVIDERS:-polygon,tiingo,twelvedata,yahoo}
      MARKET_AI_MARKET_TIMEZONE: ${MARKET_AI_MARKET_TIMEZONE:-America/New_York}
      MARKET_AI_MARKET_SESSION_CLOSE_HOUR: ${MARKET_AI_MARKET_SESSION_CLOSE_HOUR:-16}
      MARKET_AI_MARKET_SESSION_CLOSE_MINUTE: ${MARKET_AI_MARKET_SESSION_CLOSE_MINUTE:-0}
      MARKET_AI_MARKET_SESSION_CLOSE_BUFFER_MINUTES: ${MARKET_AI_MARKET_SESSION_CLOSE_BUFFER_MINUTES:-20}
      ALPACA_MARKET_DATA_API_KEY: ${ALPACA_MARKET_DATA_API_KEY:-}
      ALPACA_MARKET_DATA_SECRET_KEY: ${ALPACA_MARKET_DATA_SECRET_KEY:-}
      MARKET_AI_ALPACA_MARKET_DATA_BASE_URL: ${MARKET_AI_ALPACA_MARKET_DATA_BASE_URL:-https://data.alpaca.markets}
      MARKET_AI_ALPACA_MARKET_DATA_FEED: ${MARKET_AI_ALPACA_MARKET_DATA_FEED:-iex}
      POLYGON_API_KEY: ${POLYGON_API_KEY:-}
      MARKET_AI_POLYGON_MARKET_DATA_BASE_URL: ${MARKET_AI_POLYGON_MARKET_DATA_BASE_URL:-https://api.polygon.io}
      TIINGO_API_KEY: ${TIINGO_API_KEY:-}
      MARKET_AI_TIINGO_MARKET_DATA_BASE_URL: ${MARKET_AI_TIINGO_MARKET_DATA_BASE_URL:-https://api.tiingo.com}
      TWELVEDATA_API_KEY: ${TWELVEDATA_API_KEY:-}
      MARKET_AI_TWELVEDATA_MARKET_DATA_BASE_URL: ${MARKET_AI_TWELVEDATA_MARKET_DATA_BASE_URL:-https://api.twelvedata.com}
      MARKET_AI_BROKER_ORDER_SUBMISSION_ENABLED: ${MARKET_AI_BROKER_ORDER_SUBMISSION_ENABLED:-0}
      MARKET_AI_BROKER_LIVE_EXECUTION_ENABLED: ${MARKET_AI_BROKER_LIVE_EXECUTION_ENABLED:-0}
      MARKET_AI_AUTO_TRADING_ENABLED: ${MARKET_AI_AUTO_TRADING_ENABLED:-0}
      MARKET_AI_AUTO_TRADING_CYCLE_MINUTES: ${MARKET_AI_AUTO_TRADING_CYCLE_MINUTES:-5}
      MARKET_AI_AUTO_TRADING_QUANTITY: ${MARKET_AI_AUTO_TRADING_QUANTITY:-1}
      MARKET_AI_PAPER_TRADING_24_7: ${MARKET_AI_PAPER_TRADING_24_7:-1}
      MARKET_AI_PAPER_STARTING_CASH: ${MARKET_AI_PAPER_STARTING_CASH:-100000}
      MARKET_AI_CONTINUOUS_PAPER_TRADING: ${MARKET_AI_CONTINUOUS_PAPER_TRADING:-1}
      MARKET_AI_AUTO_TRADING_SYMBOL_LIMIT: ${MARKET_AI_AUTO_TRADING_SYMBOL_LIMIT:-8}
      MARKET_AI_AUTO_TRADING_ANALYSIS_LOOKBACK_DAYS: ${MARKET_AI_AUTO_TRADING_ANALYSIS_LOOKBACK_DAYS:-30}
      MARKET_AI_AUTO_TRADING_NOTIONAL_PER_TRADE: ${MARKET_AI_AUTO_TRADING_NOTIONAL_PER_TRADE:-0}
      MARKET_AI_RISK_MAX_TRADE_PCT: ${MARKET_AI_RISK_MAX_TRADE_PCT:-10.0}
      OLLAMA_ENABLED: ${OLLAMA_ENABLED:-1}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gemma2:2b}
      MARKET_AI_PROVIDER: ${MARKET_AI_PROVIDER:-ollama}
      OLLAMA_TIMEOUT_SECONDS: ${OLLAMA_TIMEOUT_SECONDS:-300}
      MARKET_AI_AUTOMATION_SYMBOL_LIMIT: ${MARKET_AI_AUTOMATION_SYMBOL_LIMIT:-10}
      MARKET_AI_MARKET_CYCLE_MINUTES: ${MARKET_AI_MARKET_CYCLE_MINUTES:-15}
      MARKET_AI_ALERT_CYCLE_MINUTES: ${MARKET_AI_ALERT_CYCLE_MINUTES:-10}
      MARKET_AI_BREADTH_CYCLE_MINUTES: ${MARKET_AI_BREADTH_CYCLE_MINUTES:-20}
      MARKET_AI_ALERT_SYMBOL_LIMIT: ${MARKET_AI_ALERT_SYMBOL_LIMIT:-10}
      MARKET_AI_BREADTH_SYMBOL_LIMIT: ${MARKET_AI_BREADTH_SYMBOL_LIMIT:-12}
      MARKET_AI_SAMPLE_SYMBOLS: ${MARKET_AI_SAMPLE_SYMBOLS:-AAPL,MSFT,NVDA,AMZN,GOOGL,META,SPY,QQQ}
      MARKET_AI_REDIS_URL: redis://redis:6379/0
      MARKET_AI_REDIS_ENABLED: "1"
      MARKET_AI_REDIS_CACHE_TTL_DEFAULT: "300"
      MARKET_AI_TRAINING_SUBPROCESS_ENABLED: "1"
      MARKET_AI_REMOTE_TRAINING_ENABLED: ${MARKET_AI_REMOTE_TRAINING_ENABLED:-0}
      MARKET_AI_WORKER_TOKEN: ${MARKET_AI_WORKER_TOKEN:-}
      MARKET_AI_REMOTE_WORKER_STALE_SECONDS: ${MARKET_AI_REMOTE_WORKER_STALE_SECONDS:-300}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./data:/app/data
      - ./model_artifacts:/app/model_artifacts
    deploy:
      resources:
        limits:
          memory: ${MARKET_AI_AUTOMATION_MEMORY_LIMIT:-5G}
          cpus: "${MARKET_AI_AUTOMATION_CPU_LIMIT:-3.0}"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 400mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis_data:/data
    deploy:
      resources:
        limits:
          memory: ${MARKET_AI_REDIS_MEMORY_LIMIT:-512M}
          cpus: "${MARKET_AI_REDIS_CPU_LIMIT:-0.5}"

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    environment:
      OLLAMA_KEEP_ALIVE: ${OLLAMA_KEEP_ALIVE:-24h}
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: ${MARKET_AI_OLLAMA_MEMORY_LIMIT:-5G}
          cpus: "${MARKET_AI_OLLAMA_CPU_LIMIT:-2.0}"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/}
    restart: unless-stopped
    environment:
      MARKET_AI_SERVER_NAME: ${MARKET_AI_SERVER_NAME:-_}
      MARKET_AI_BACKEND_UPSTREAM: ${MARKET_AI_BACKEND_UPSTREAM:-backend:8000}
    ports:
      - "127.0.0.1:${MARKET_AI_FRONTEND_PUBLISHED_PORT:-4173}:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null 2>&1 || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: ${MARKET_AI_FRONTEND_MEMORY_LIMIT:-128M}
          cpus: "${MARKET_AI_FRONTEND_CPU_LIMIT:-0.5}"

volumes:
  postgres_data:
  redis_data:
  ollama_data:
