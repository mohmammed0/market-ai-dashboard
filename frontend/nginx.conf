upstream market_ai_backend {
  server ${MARKET_AI_BACKEND_UPSTREAM};
}

server {
  listen 80;
  server_name ${MARKET_AI_SERVER_NAME};
  client_max_body_size 16m;

  root /usr/share/nginx/html;
  index index.html;

  location /api/ {
    proxy_pass http://market_ai_backend/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port $server_port;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location = /health {
    proxy_pass http://market_ai_backend/health;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }

  location = /ready {
    proxy_pass http://market_ai_backend/ready;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
