upstream market_ai_backend {
  server ${MARKET_AI_BACKEND_UPSTREAM};
}

server {
  listen 80;
  server_name ${MARKET_AI_SERVER_NAME};
  client_max_body_size 16m;

  root /usr/share/nginx/html;
  index index.html;

  location /api/ {
    proxy_pass http://market_ai_backend/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port $server_port;
    proxy_set_header X-Forwarded-Proto $scheme;
    # Long timeout so ML endpoints don't return a non-JSON nginx 504 page.
    proxy_read_timeout 120s;
    proxy_send_timeout 120s;
  }

  location = /health {
    proxy_pass http://market_ai_backend/health;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }

  location = /ready {
    proxy_pass http://market_ai_backend/ready;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }

  location /auth/ {
    proxy_pass http://market_ai_backend/auth/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port $server_port;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # index.html must NEVER be cached — otherwise the browser keeps loading
  # the old SPA bundle after a deploy. Hashed files under /assets/ are safe
  # for long-term caching since Vite regenerates filenames on every build.
  location = /index.html {
    add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
    add_header Pragma "no-cache" always;
    expires -1;
  }

  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable" always;
  }

  location / {
    add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
    try_files $uri $uri/ /index.html;
  }
}
