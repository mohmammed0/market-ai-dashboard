name: Frontend validation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install
      - name: Build frontend
        working-directory: frontend
        run: npm run build

  frontend-e2e:
    runs-on: ubuntu-latest
    needs: frontend-build
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements-api.txt
      - name: Start backend API
        env:
          MARKET_AI_AUTH_ENABLED: "0"
          MARKET_AI_ENABLE_SCHEDULER: "0"
          MARKET_AI_ENABLE_CONTINUOUS_LEARNING: "0"
        run: |
          python -m uvicorn backend.app.main:app --host 127.0.0.1 --port 8000 > backend.log 2>&1 &
          for i in {1..30}; do
            if curl -fs http://127.0.0.1:8000/health > /dev/null; then
              echo "Backend is up.";
              exit 0;
            fi
            sleep 1
          done
          echo "Backend failed to start."
          cat backend.log
          exit 1
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install
      - name: Build frontend
        working-directory: frontend
        run: npm run build
      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium
      - name: Start frontend preview
        working-directory: frontend
        run: |
          npm run preview -- --host 127.0.0.1 --port 4173 > preview.log 2>&1 &
          for i in {1..20}; do
            if curl -fs http://127.0.0.1:4173 > /dev/null; then
              echo "Frontend preview is up.";
              exit 0;
            fi
            sleep 1
          done
          echo "Frontend preview failed to start."
          cat preview.log
          exit 1
      - name: Run Playwright tests
        working-directory: frontend
        env:
          PLAYWRIGHT_BASE_URL: "http://127.0.0.1:4173"
          PLAYWRIGHT_API_BASE_URL: "http://127.0.0.1:8000"
        run: npm run test:e2e
